<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Oficial | Blue Lock Fan Event</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .page-header { margin-top: 150px; position: relative; }
        .page-header-line { position: absolute; top: 0; left: -10px; width: 4px; height: 100%; background: var(--accent-blue); }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 60px;
            margin-bottom: 100px;
        }
        .cosplayer-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .cosplayer-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            transition: 0.5s;
        }
        .cosplayer-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0, 136, 255, 0.2);
        }
        .cosplayer-info {
            padding: 20px;
        }
    </style>
</head>
<body class="egoist-grid">
    <div class="container" style="position: relative; z-index: 2; min-height: 80vh;">
        <div class="reveal-item delay-2 page-header">
            <div class="page-header-line"></div>
            <div style="font-family: var(--font-header); font-size: 0.8rem; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 10px;">
                DATABASE / SYSTEM / MERCH
            </div>
            <h1 style="font-size: 5rem; line-height: 0.8; font-family: var(--font-header); margin-bottom: 20px;">
                MERCH <br> <span class="highlight-blue">OFICIAL</span>
            </h1>
            <p style="color: #fff; font-size: 1.1rem; max-width: 500px; opacity: 0.8;">
                Equípate para sobrevivir a Blue Lock con nuestros artículos exclusivos del tour.
            </p>
        </div>

        <div id="content-grid" class="grid-container" data-type="merch">
            <!-- Cards will be injected here via page-init.js -->
        </div>
    </div>

    <script type="module" src="/src/page-init.js"></script>
</body>
</html>
