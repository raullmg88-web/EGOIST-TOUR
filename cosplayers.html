<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosplayers Oficiales | Blue Lock Fan Event</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .cosplayer-page { min-height: 100vh; padding-top: 120px; }
        .cosplayer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }
        .cosplayer-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .cosplayer-card:hover {
            transform: translateY(-15px);
            border-color: var(--accent-blue);
            box-shadow: 0 20px 40px rgba(0, 136, 255, 0.2);
        }
        .cosplayer-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            filter: grayscale(0.5);
            transition: 0.5s;
        }
        .cosplayer-card:hover .cosplayer-img {
            filter: grayscale(0);
        }
        .cosplayer-info {
            padding: 30px;
            background: linear-gradient(to top, var(--bg-card) 80%, transparent);
            position: absolute;
            bottom: 0;
            width: 100%;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-cyan);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-family: var(--font-header);
        }
    </style>
</head>
<body class="cosplayer-page egoist-grid">
    <!-- Top Nav Bar -->
    <div class="reveal-item delay-1" style="position: absolute; top: 0; left: 0; width: 100%; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 100;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
            <a href="/" class="back-link" style="margin-bottom: 0; padding: 8px 20px; background: var(--accent-blue); color: #000; clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%);">
                VOLVER AL INICIO
            </a>
            <div style="font-family: var(--font-header); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 2px;">

    </div>
