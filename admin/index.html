<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Egoist Tour</title>
    <link rel="stylesheet" href="/src/admin/admin.css">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="view-container">
            <div class="auth-box">
                <img src="/assets/logooo.png" alt="EGOIST TOUR" class="admin-logo">
                <h2>Acceso Restringido</h2>
                <p>Base de datos del sistema Egoist</p>
                <form id="login-form">
                    <div class="form-group">
                        <label>Código Secreto</label>
                        <input type="password" id="secret_code" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar Sesión</button>
                    <p id="auth-error" class="error-msg"></p>
                </form>
                <div style="margin-top: 20px; text-align: center;">
                    <a href="/" style="color: var(--text-muted); font-size: 0.9rem;">&larr; Volver a la web</a>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view-container hidden">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <img src="/assets/logo_brito.png" alt="Egoist Admin">
                </div>
                <nav class="sidebar-nav">
                    <button class="nav-item active" data-module="dashboard">Dashboard</button>
                    <button class="nav-item" data-module="cosplayers">Cosplayers</button>
                    <button class="nav-item" data-module="artistas">Artistas</button>
                    <button class="nav-item" data-module="invitados">Invitados</button>
                    <button class="nav-item" data-module="merch">Merch</button>
                    <button class="nav-item" data-module="horarios">Horarios</button>
                    <button class="nav-item" data-module="home">Contenido Home</button>
                </nav>
                <div class="sidebar-footer">
                    <button id="logout-btn" class="nav-item text-red">Cerrar Sesión</button>
                </div>
            </aside>
            <main class="main-content">
                <header class="topbar">
                    <h1 id="module-title">Dashboard Principal</h1>
                    <div class="user-info" id="user-info">admin@egoist.tour</div>
                </header>
                <div id="module-content" class="content-area">
                    <!-- Dynamic content loaded via JS -->
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="/src/admin/admin.js"></script>
</body>
</html>
